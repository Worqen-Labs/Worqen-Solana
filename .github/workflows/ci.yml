name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  SOLANA_VERSION: "4.0.0"
  ANCHOR_VERSION: "0.32.1"

jobs:
  lint:
    name: fmt + clippy + prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      # cfg lints are declared in Cargo.toml [lints]; no CLI -A needed.
      - run: cargo clippy --all-targets -- -D warnings
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint

  test:
    name: build + LiteSVM tests (bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Solana CLI (Agave)
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor (avm)
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force --locked
          avm install ${ANCHOR_VERSION}
          avm use ${ANCHOR_VERSION}

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      # Build the program; the .so is loaded in-process by LiteSVM (no validator).
      - run: anchor build

      # Full per-instruction suite, in-process via LiteSVM — fast, deterministic,
      # supports clock warp (time-locked auto-release is covered).
      - run: bun test
